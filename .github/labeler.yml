ci:
  - changed-files:
      - any-glob-to-any-file: ['.github/workflows/**', '.github/labeler.yml']

curation:
  - changed-files:
      - any-glob-to-any-file: ['sift/curation.py', 'tests/test_curation.py', 'docs/**']

db:
  - changed-files:
      - any-glob-to-any-file: ['sift/db.py', 'tests/test_db.py']

docs:
  - changed-files:
      - any-glob-to-any-file: ['README.md', 'docs/**', 'CONTRIBUTING.md']

tests:
  - changed-files:
      - any-glob-to-any-file: ['tests/**', 'pytest.ini']
