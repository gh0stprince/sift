name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build
      - name: Smoke test clean wheel install
        run: |
          python -m venv /tmp/sift-wheel
          /tmp/sift-wheel/bin/pip install --force-reinstall dist/*.whl
          /tmp/sift-wheel/bin/python -c "import sift.cli; import sift.crawler; import sift.curation; import sift.db; import sift.feeds; import sift.pulse; import sift.robots; import sift.synthesize; import sift.wiki"
          /tmp/sift-wheel/bin/sift --help
          /tmp/sift-wheel/bin/python -m sift --help
      - name: Smoke test clean source install
        run: |
          python -m venv /tmp/sift-sdist
          /tmp/sift-sdist/bin/pip install --force-reinstall dist/*.tar.gz
          /tmp/sift-sdist/bin/python -c "import sift.cli; import sift.crawler; import sift.curation; import sift.db; import sift.feeds; import sift.pulse; import sift.robots; import sift.synthesize; import sift.wiki"
          /tmp/sift-sdist/bin/sift --help
          /tmp/sift-sdist/bin/python -m sift --help
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.whl
