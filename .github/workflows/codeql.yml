name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL (python)
    runs-on: ubuntu-latest
    steps:
      - name: Skip advanced CodeQL workflow
        run: |
          echo "Skipping advanced CodeQL workflow because repository default setup is enabled."
          echo "Code scanning is handled by GitHub CodeQL default setup."
